<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>書籍編集</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { padding: 8px; width: 200px; }
        button { padding: 8px 15px; margin-right: 10px; cursor: pointer; }
        .update-btn { background-color: #28a745; color: white; border: none; }
        .update-btn:hover { background-color: #218838; }
        .back-btn { background-color: #6c757d; color: white; border: none; }
        .back-btn:hover { background-color: #5a6268; }
    </style>
</head>
<body>
    <h1>書籍編集</h1>

    <form th:action="@{/books/edit(id=${book.id})}" method="post">
        <div class="form-group">
            <label>タイトル:</label>
            <input type="text" name="title" th:value="${book.title}" required>
        </div>
        <div class="form-group">
            <label>著者:</label>
            <input type="text" name="author" th:value="${book.author}" required>
        </div>
        <div class="form-group">
            <label>ISBN:</label>
            <input type="text" name="isbn" th:value="${book.isbn}" required>
        </div>
        <div class="form-group">
            <label>価格:</label>
            <input type="number" name="price" step="0.01" th:value="${book.price}" required>
        </div>
        <button type="submit" class="update-btn">更新</button>
        <a th:href="@{/books}">
            <button type="button" class="back-btn">戻る</button>
        </a>
    </form>
</body>
</html>
